<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects – Kokraf</title>

  <!-- Meta Description -->
  <meta name="description" content=Kokraf Projects lets you store, edit, and manage your 3D creations in one place."" />

  <!-- Favicon and App Name -->
  <meta name="application-name" content="Kokraf" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon_io/favicon-16x16.png">
  <link rel="icon" href="/assets/favicon_io/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon_io/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon_io/android-chrome-512x512.png">
  <link rel="manifest" href="/assets/favicon_io/site.webmanifest">

  <link rel="stylesheet" href="./projects-page.css" />
  <link rel="stylesheet" href="./edit-profile-panel.css" />

  <script type="importmap">
    {
      "imports": {
        "supabase": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
  </script>
</head>

<body>
  <header class="app-header">
    <div class="header-left">
      <img src="../assets/images/KokrafLogo.png" class="logo" />
    </div>

    <div class="header-right">
      <button id="new-project-btn" class="primary-btn">+ New Project</button>
      <button id="account-btn">Account</button>
    </div>
  </header>

  <main class="projects-container">
    <section class="profile-header">
      <div class="profile-banner"></div>

      <div class="profile-content">
        <img class="profile-avatar" src="../assets/icons/default-avatar.svg" />
        <div id="profile-info" class="profile-info">
          <div class="profile-name">Your Name</div>
          <div class="profile-username">@username</div>
        </div>
      </div>
    </section>

    <div class="panel-header">
      <div class="tab-name">Projects</div>
      <button id="edit-profile-btn" class="primary-btn">Edit Profile</button>
    </div>
    <div class="content-layout">
      <div class="main-content">
        <div id="projects-grid" class="projects-grid">
        </div>
      </div>

      <aside class="right-panel">
        <div class="about-card">
          <div class="about-title">About</div>
          <p>This is your profile description. You can describe your work here.</p>
        </div>
      </aside>
    </div>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
